<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<title>MAME: The Last Shiba — Chapter 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Rajdhani:wght@500;700&display=block" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
  #stage { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; }
  #vid { width: 100%; height: 100%; object-fit: cover; background: #000; }

  /* subtitle bar (typed, synced to audio) — cinematic film style */
  #sub {
    position: fixed; left: 50%; bottom: 9%; transform: translateX(-50%) translateY(8px);
    max-width: min(900px, 90%); padding: 12px 30px; text-align: center;
    font-size: clamp(19px, 3.1vw, 31px); font-weight: 700; color: #fff;
    line-height: 1.3; letter-spacing: .4px;
    background: linear-gradient(180deg, rgba(10,12,22,.30), rgba(10,12,22,.74));
    border-radius: 16px; border: 1px solid rgba(255,255,255,.10);
    box-shadow: 0 10px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
    backdrop-filter: blur(10px) saturate(1.1);
    text-shadow: 0 1px 2px #000, 0 2px 12px rgba(0,0,0,.6);
    opacity: 0; transition: opacity .22s ease, transform .22s ease; pointer-events: none;
  }
  #sub.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #sub::after {
    content: ''; position: absolute; left: 50%; bottom: -1px; transform: translateX(-50%);
    width: 56px; height: 3px; border-radius: 3px; background: linear-gradient(90deg, #ff3b6b, #ff8a4b);
    box-shadow: 0 0 12px #ff3b6b;
  }

  /* choices overlay */
  #choices {
    position: fixed; left: 0; right: 0; bottom: 0; top: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    gap: 16px; padding: 0 24px 9%; opacity: 0; pointer-events: none;
    transition: opacity .35s; background: linear-gradient(to top, rgba(0,0,0,.6), transparent 45%);
  }
  #choices.show { opacity: 1; pointer-events: auto; }
  .choice {
    display: flex; align-items: center; width: min(560px, 92%); padding: 16px 22px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-size: clamp(16px, 2.6vw, 22px); font-weight: 700;
    color: #fff; text-align: left; border: 2px solid rgba(255,255,255,.35);
    background: rgba(12,14,26,.78); border-radius: 14px;
    backdrop-filter: blur(6px); transition: transform .12s, border-color .12s, background .12s;
  }
  .choice b {
    flex: 0 0 auto; display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; margin-right: 14px; border-radius: 8px;
    background: #ff3b6b; color: #fff; font-size: 16px;
  }
  .choice:hover { transform: translateY(-2px); border-color: #ff3b6b; background: rgba(40,16,28,.9); }

  /* placeholder note badge */
  #note {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    padding: 7px 16px; font-weight: 700; font-size: 13px; letter-spacing: .5px;
    color: #ffd45e; background: rgba(0,0,0,.6); border: 1px solid #ffd45e55;
    border-radius: 20px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 5;
  }
  #note.show { opacity: 1; }

  /* mute button */
  #muteBtn {
    position: fixed; top: 14px; right: 16px; z-index: 6; cursor: pointer;
    width: 44px; height: 44px; border: none; border-radius: 50%;
    background: rgba(0,0,0,.5); color: #fff; font-size: 20px;
  }

  /* start screen */
  #start {
    position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 24px; text-align: center;
    background: radial-gradient(circle at 50% 40%, #1a1030, #05060f 75%);
    transition: opacity .5s;
  }
  #start.hide { opacity: 0; pointer-events: none; }
  #start h1 {
    font-family: 'Bangers', cursive; font-size: clamp(44px, 11vw, 110px);
    color: #fff; letter-spacing: 3px; line-height: .9;
    text-shadow: 0 0 24px #ff3b6b, 0 6px 0 #7a0e2b;
  }
  #start h2 { font-weight: 700; color: #ffd45e; font-size: clamp(16px, 3.2vw, 26px); letter-spacing: 4px; }
  #startBtn {
    margin-top: 8px; padding: 16px 54px; cursor: pointer;
    font-family: 'Bangers', cursive; font-size: clamp(22px, 5vw, 34px); letter-spacing: 2px;
    color: #fff; border: none; border-radius: 50px;
    background: linear-gradient(135deg, #ff3b6b, #ff8a4b);
    box-shadow: 0 8px 28px #ff3b6b88; transition: transform .12s;
  }
  #startBtn:hover { transform: scale(1.06); }
  #start p { color: #9fb0cf; font-size: 14px; letter-spacing: 1px; }

  /* chapter splash card (between NEW GAME and the video) */
  #splash {
    position: fixed; inset: 0; z-index: 18; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; text-align: center;
    background: radial-gradient(circle at 50% 45%, #160e2c, #04050c 80%);
    opacity: 0; pointer-events: none; transition: opacity .7s ease;
  }
  #splash.show { opacity: 1; }
  #splash.hide { opacity: 0; }
  #splash .sp-ch {
    font-family: 'Bangers', cursive; font-size: clamp(40px, 9vw, 96px); color: #fff;
    letter-spacing: 4px; text-shadow: 0 0 26px #ff3b6b, 0 6px 0 #7a0e2b;
    transform: translateY(10px); animation: spIn .8s ease forwards;
  }
  #splash .sp-sub {
    font-weight: 700; font-size: clamp(15px, 3vw, 24px); color: #ffd45e; letter-spacing: 3px;
    opacity: 0; animation: spIn .8s ease .25s forwards;
  }
  @keyframes spIn { to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div id="stage">
    <video id="vid" playsinline preload="auto"></video>
  </div>

  <div id="sub"></div>
  <div id="note"></div>
  <div id="choices"></div>
  <button id="muteBtn">🔊</button>

  <div id="start">
    <h1>MAME</h1>
    <h2>THE LAST SHIBA</h2>
    <button id="startBtn">▶ NEW GAME</button>
    <p>An interactive film — your choices change the story.</p>
  </div>

  <div id="splash">
    <div class="sp-ch">CHAPTER 1</div>
    <div class="sp-sub">ASHES OF DOG PLANET</div>
  </div>

  <script>
    // cache-busting loader so GitHub Pages always serves the latest scripts
    var v = Date.now();
    document.write('<script src="js/story-data.js?t=' + v + '"><\/script>');
    document.write('<script src="js/fmv.js?t=' + v + '"><\/script>');
  </script>
</body>
</html>
