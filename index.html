<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<title>MAME: The Last Shiba — Chapter 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=block" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Rajdhani', sans-serif; }
  #stage { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  /* blurred, zoomed copy fills the letterbox so portrait has no ugly black bars */
  #vidbg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    filter: blur(30px) brightness(.55) saturate(1.15); transform: scale(1.25); z-index: 0; pointer-events: none; }
  #vid { position: relative; z-index: 1; width: 100%; height: 100%; object-fit: cover; background: transparent; }

  /* subtitle bar (typed, synced to audio) — cinematic film style */
  #sub {
    position: fixed; left: 50%; bottom: 9%; transform: translateX(-50%) translateY(8px);
    max-width: min(900px, 90%); padding: 12px 30px; text-align: center;
    font-size: clamp(19px, 3.1vw, 31px); font-weight: 700; color: #fff;
    line-height: 1.3; letter-spacing: .4px;
    background: linear-gradient(180deg, rgba(10,12,22,.30), rgba(10,12,22,.74));
    border-radius: 16px; border: 1px solid rgba(255,255,255,.10);
    box-shadow: 0 10px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
    backdrop-filter: blur(10px) saturate(1.1);
    text-shadow: 0 1px 2px #000, 0 2px 12px rgba(0,0,0,.6);
    opacity: 0; transition: opacity .22s ease, transform .22s ease; pointer-events: none;
  }
  #sub.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #sub::after {
    content: ''; position: absolute; left: 50%; bottom: -1px; transform: translateX(-50%);
    width: 56px; height: 3px; border-radius: 3px; background: linear-gradient(90deg, #ff3b6b, #ff8a4b);
    box-shadow: 0 0 12px #ff3b6b;
  }

  /* choices overlay */
  #choices {
    position: fixed; left: 0; right: 0; bottom: 0; top: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    gap: 16px; padding: 0 24px 9%; opacity: 0; pointer-events: none;
    transition: opacity .35s; background: linear-gradient(to top, rgba(0,0,0,.82), rgba(0,0,0,.3) 55%, transparent);
  }
  #choices.show { opacity: 1; pointer-events: auto; }
  .choice {
    display: flex; align-items: center; width: min(560px, 92%); padding: 16px 22px; cursor: pointer;
    font-family: 'Rajdhani', sans-serif; font-size: clamp(16px, 2.6vw, 22px); font-weight: 700;
    color: #fff; text-align: left; border: 2px solid rgba(255,255,255,.5);
    background: rgba(8,10,20,.9); border-radius: 14px; text-shadow: 0 1px 4px #000;
    box-shadow: 0 6px 22px rgba(0,0,0,.55); backdrop-filter: blur(8px);
    transition: transform .12s, border-color .12s, background .12s;
  }
  .choice b {
    flex: 0 0 auto; display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; margin-right: 14px; border-radius: 8px;
    background: #ff3b6b; color: #fff; font-size: 16px;
  }
  .choice:hover { transform: translateY(-2px); border-color: #ff3b6b; background: rgba(40,16,28,.9); }

  /* placeholder note badge */
  #note {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    padding: 7px 16px; font-weight: 700; font-size: 13px; letter-spacing: .5px;
    color: #ffd45e; background: rgba(0,0,0,.6); border: 1px solid #ffd45e55;
    border-radius: 20px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 5;
  }
  #note.show { opacity: 1; }

  /* top buttons */
  #muteBtn {
    position: fixed; top: 14px; right: 16px; z-index: 6; cursor: pointer;
    width: 44px; height: 44px; border: none; border-radius: 50%;
    background: rgba(0,0,0,.5); color: #fff; font-size: 20px;
  }
  #backBtn {
    position: fixed; top: 14px; left: 16px; z-index: 6; cursor: pointer;
    width: 44px; height: 44px; border: none; border-radius: 50%;
    background: rgba(0,0,0,.5); color: #fff; font-size: 18px; display: none;
    align-items: center; justify-content: center;
  }
  #backBtn.show { display: flex; }
  #backBtn:hover { background: rgba(255,59,107,.7); }

  /* smooth scene transition (fade through black) */
  #fade {
    position: fixed; inset: 0; z-index: 17; background: #000;
    opacity: 0; pointer-events: none; transition: opacity .25s ease;
  }
  #fade.show { opacity: 1; }
  /* loading spinner shown while the next clip buffers (so black never looks like a freeze) */
  #fade::after {
    content: ''; position: absolute; top: 50%; left: 50%; width: 42px; height: 42px;
    margin: -21px 0 0 -21px; border: 3px solid rgba(255,255,255,.2); border-top-color: #ff3b6b;
    border-radius: 50%; opacity: 0; transition: opacity .2s; animation: spin 0.8s linear infinite;
  }
  #fade.show.busy::after { opacity: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== landing page (start menu) — restored MAME hero layout ===== */
  #start {
    position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
    justify-content: space-between; gap: 8px; overflow: hidden; text-align: center;
    padding: clamp(16px,3vh,38px) clamp(18px,4vw,56px);
    background: radial-gradient(circle at 72% 28%, #2a0f14 0%, #150a14 48%, #06040a 100%);
    transition: opacity .5s;
  }
  #start.hide { opacity: 0; pointer-events: none; }
  #start .bg-planet { position: absolute; top: 5%; right: 5%; width: min(24vw,280px); opacity: .5; z-index: 0;
    pointer-events: none; filter: drop-shadow(0 0 50px rgba(120,180,255,.45)); animation: floaty 8s ease-in-out infinite; }
  #start .think { position: absolute; top: 18%; right: 20%; z-index: 0; pointer-events: none; }
  #start .think span { position: absolute; border-radius: 50%; background: rgba(255,255,255,.22);
    border: 2px solid rgba(255,255,255,.8); box-shadow: 0 0 12px rgba(255,255,255,.55); animation: floaty 5s ease-in-out infinite; }
  #start .think .b1 { width: 26px; height: 26px; top: 0; right: 0; }
  #start .think .b2 { width: 16px; height: 16px; top: 36px; right: 40px; animation-delay: .4s; }
  #start .think .b3 { width: 9px; height: 9px; top: 64px; right: 74px; animation-delay: .8s; }
  #start .land { flex: 1 1 auto; display: flex; align-items: center; justify-content: center;
    gap: clamp(16px,5vw,70px); flex-wrap: wrap; width: 100%; max-width: 1180px; margin: auto; z-index: 1; }
  #start .land-left { flex: 1 1 360px; max-width: 560px; text-align: left; display: flex; flex-direction: column; align-items: flex-start; gap: 13px; }
  #start .hero-title { font-family: 'Bangers', cursive; font-size: clamp(58px,11vw,138px); color: #fff; letter-spacing: 4px; line-height: .78;
    text-shadow: 0 5px 0 rgba(0,0,0,.55),0 0 50px rgba(255,90,80,.35); animation: popin .6s ease both, glowpulse 3s ease-in-out .6s infinite; }
  #start .hero-sub { font-family: 'Permanent Marker', cursive; font-size: clamp(28px,5.4vw,56px); color: #ffd21f; line-height: 1;
    transform: rotate(-3deg); margin-left: 6px; text-shadow: 0 3px 0 #7a5a00,0 0 22px rgba(255,210,31,.5); animation: fadein .8s ease .2s both; }
  #start .tag { text-align: left; color: #d9b9b2; max-width: 480px; line-height: 1.6; font-size: clamp(13px,3.4vw,15px); }
  #start .mbtns { display: flex; gap: 12px; flex-wrap: wrap; }
  #start .tag, #start .mbtns, #start .land-foot { animation: fadein .8s ease .35s both; }
  #start .btn { margin-top: 8px; padding: 15px 46px; font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 17px;
    letter-spacing: 2px; cursor: pointer; color: #1a1208; background: linear-gradient(180deg,#ffd84a,#f5a300);
    border: 2px solid #120d02; border-radius: 12px; box-shadow: 0 5px 0 #946700,0 10px 22px rgba(0,0,0,.5); transition: transform .08s, box-shadow .12s; }
  #start .btn:hover { box-shadow: 0 6px 0 #946700,0 12px 26px rgba(0,0,0,.55); transform: translateY(-2px); }
  #start .land-right { flex: 0 0 auto; display: flex; justify-content: center; }
  #start .hero-mascot { height: clamp(240px,54vh,520px); object-fit: contain; margin-top: clamp(30px,7vh,80px);
    filter: drop-shadow(0 16px 40px rgba(0,0,0,.8)); animation: floaty 3.8s ease-in-out infinite; }
  #start .land-foot { z-index: 1; display: flex; justify-content: center; padding-top: 4px; }
  #start .socials { display: flex; gap: 14px; justify-content: center; }
  #start .socials a { width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; color: #ffd84a;
    background: rgba(0,0,0,.4); border: 1px solid #ffd84a88; border-radius: 50%; transition: .15s; }
  #start .socials a:hover { color: #120d02; background: #ffd84a; transform: translateY(-3px); }
  #start .socials svg { width: 22px; height: 22px; fill: currentColor; }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popin { from { opacity: 0; transform: translateY(20px) scale(.96); } to { opacity: 1; transform: none; } }
  @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-13px); } }
  @keyframes glowpulse { 0%,100% { text-shadow: 0 5px 0 rgba(0,0,0,.55),0 0 40px rgba(255,90,80,.3); } 50% { text-shadow: 0 5px 0 rgba(0,0,0,.55),0 0 70px rgba(255,90,80,.6); } }
  /* responsive: landing on small / portrait screens */
  @media (max-width: 820px) {
    #start { justify-content: flex-start; padding-top: 5vh; }
    #start .land { flex-direction: column; gap: 14px; flex: 0 0 auto; }
    #start .land-left { align-items: center; text-align: center; }
    #start .tag { text-align: center; }
    #start .mbtns { justify-content: center; }
    #start .hero-sub { margin-left: 0; }
    #start .hero-mascot { height: clamp(150px,24vh,240px); margin-top: 6px; }
    #start .bg-planet, #start .think { display: none; }  /* hide Dog Planet on mobile */
    #start .land-foot { position: absolute; bottom: 18px; left: 0; right: 0; }
  }
  /* responsive: portrait/phone — video is letterboxed (object-fit:contain), so pin the
     subtitle just INSIDE the video's lower edge instead of in the black bar below it.
     Contained 16:9 video height = 56.25vw, vertically centered → bottom edge sits at
     (50vh - 28.125vw) from screen bottom. */
  @media (max-aspect-ratio: 1/1) {
    #vid { object-fit: contain; }
    /* video is letterboxed (blurred fill); put subtitle BELOW the video in the lower area
       so it never covers the picture */
    #sub { bottom: 7%; max-width: 94%; padding: 8px 16px; font-size: clamp(15px, 4.2vw, 22px); }
    #choices { justify-content: flex-end; padding: 0 14px 7%; gap: 12px; }
    .choice { padding: 13px 16px; }
  }

  /* chapter splash card (between NEW GAME and the video) */
  #splash {
    position: fixed; inset: 0; z-index: 18; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; text-align: center;
    background: radial-gradient(circle at 50% 45%, #160e2c, #04050c 80%);
    opacity: 0; pointer-events: none; transition: opacity .7s ease;
  }
  #splash.show { opacity: 1; }
  #splash.hide { opacity: 0; }
  #splash .sp-ch {
    font-family: 'Bangers', cursive; font-size: clamp(40px, 9vw, 96px); color: #fff;
    letter-spacing: 4px; text-shadow: 0 0 26px #ff3b6b, 0 6px 0 #7a0e2b;
    transform: translateY(10px); animation: spIn .8s ease forwards;
  }
  #splash .sp-sub {
    font-weight: 700; font-size: clamp(15px, 3vw, 24px); color: #ffd45e; letter-spacing: 3px;
    opacity: 0; animation: spIn .8s ease .25s forwards;
  }
  @keyframes spIn { to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div id="stage">
    <video id="vidbg" playsinline muted preload="auto" loop></video>
    <video id="vid" playsinline preload="auto"></video>
  </div>
  <audio id="tension" src="assets/suspense.mp3" loop preload="auto"></audio>

  <div id="sub"></div>
  <div id="note"></div>
  <div id="choices"></div>
  <div id="fade"></div>
  <button id="backBtn" title="Back / change choice">◀</button>
  <button id="muteBtn">🔊</button>

  <div id="start">
    <img class="bg-planet" src="assets/dogplanet.png" alt="" />
    <div class="think"><span class="b1"></span><span class="b2"></span><span class="b3"></span></div>
    <div class="land">
      <div class="land-left">
        <div class="hero-title">MAME</div>
        <div class="hero-sub">THE LAST<br>SHIBA</div>
        <p class="tag">He dreams of home — Dog Planet. But he woke up on <b style="color:#ff8a78">Pump Planet</b>. An interactive film where <b style="color:#ffd84a">your choices change the story</b> — and its ending.</p>
        <div class="mbtns">
          <button class="btn" id="startBtn">▸ NEW GAME</button>
        </div>
      </div>
      <div class="land-right"><img class="hero-mascot" src="assets/mame-hero.png" alt="MAME" /></div>
    </div>
    <div class="land-foot">
      <div class="socials">
        <a href="https://x.com/mamebnb" target="_blank" rel="noopener" aria-label="X">
          <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.66l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117l11.966 15.644z"/></svg>

        </a>
        <a href="https://mamebnb.com/" target="_blank" rel="noopener" aria-label="Website">
          <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm6.93 6h-2.95a15.6 15.6 0 0 0-1.38-3.56A8.03 8.03 0 0 1 18.93 8zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14a7.96 7.96 0 0 1 0-4h3.38a16.5 16.5 0 0 0 0 4H4.26zm.81 2h2.95c.32 1.25.78 2.45 1.38 3.56A7.99 7.99 0 0 1 5.07 16zm2.95-8H5.07a7.99 7.99 0 0 1 4.33-3.56A15.6 15.6 0 0 0 8.02 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82A15.6 15.6 0 0 1 12 19.96zM14.34 14H9.66a14.6 14.6 0 0 1 0-4h4.68a14.6 14.6 0 0 1 0 4zm.27 5.56c.6-1.11 1.06-2.31 1.38-3.56h2.95a7.99 7.99 0 0 1-4.33 3.56zM16.36 14a16.5 16.5 0 0 0 0-4h3.38a7.96 7.96 0 0 1 0 4h-3.38z"/></svg>
        </a>
      </div>
    </div>
  </div>

  <div id="splash">
    <div class="sp-ch">CHAPTER 1</div>
    <div class="sp-sub">ASHES OF DOG PLANET</div>
  </div>

  <script>
    // cache-busting loader so GitHub Pages always serves the latest scripts
    var v = Date.now();
    document.write('<script src="js/story-data.js?t=' + v + '"><\/script>');
    document.write('<script src="js/fmv.js?t=' + v + '"><\/script>');
  </script>
</body>
</html>
